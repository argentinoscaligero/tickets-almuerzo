# nginx.conf — tickets.admifarmgroup.com
# HTTP solamente hasta obtener certificado SSL con setup-ssl.sh

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  client_max_body_size 15M;
  sendfile      on;
  keepalive_timeout 65;

  # Resolver DNS interno de Docker (resuelve nombres de servicios dinamicamente)
  # Esto evita "host not found" cuando nginx arranca antes que la app
  resolver 127.0.0.11 valid=10s ipv6=off;

  access_log  /var/log/nginx/access.log;
  error_log   /var/log/nginx/error.log warn;

  server {
    listen 80;
    server_name tickets.admifarmgroup.com _;

    # Health check nginx
    location /nginx-health {
      access_log off;
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # Certbot challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Uploads (imagenes de tickets)
    location /uploads/ {
      alias /var/www/uploads/;
      expires 7d;
      add_header Cache-Control "public";
    }

    # App Next.js — variable para resolucion DNS dinamica
    location / {
      set $nextjs_upstream http://app:3000;
      proxy_pass         $nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
      proxy_connect_timeout 10s;
    }
  }
}

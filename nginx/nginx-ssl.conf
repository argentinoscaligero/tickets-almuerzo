# ──────────────────────────────────────────────────────────────────────────────
# nginx-ssl.conf — tickets.admifarmgroup.com
# ETAPA 2: HTTPS con Let's Encrypt
# Usar DESPUÉS de ejecutar: ./scripts/setup-ssl.sh
# Activar con: cp nginx/nginx-ssl.conf nginx/nginx.conf && docker compose restart nginx
# ──────────────────────────────────────────────────────────────────────────────
events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  client_max_body_size 15M;
  sendfile      on;
  keepalive_timeout 65;

  # Seguridad
  add_header X-Frame-Options       "SAMEORIGIN"   always;
  add_header X-Content-Type-Options "nosniff"     always;
  add_header X-XSS-Protection      "1; mode=block" always;
  add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

  # Resolver DNS interno de Docker
  resolver 127.0.0.11 valid=10s ipv6=off;

  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log warn;

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name tickets.admifarmgroup.com;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    http2  on;
    server_name tickets.admifarmgroup.com;

    ssl_certificate     /etc/letsencrypt/live/tickets.admifarmgroup.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tickets.admifarmgroup.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Health check
    location /nginx-health {
      return 200 'ok';
      add_header Content-Type text/plain;
    }

    # Archivos estáticos Next.js (cache agresivo)
    location /_next/static/ {
      proxy_pass http://nextjs_app;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Uploads (imágenes de tickets)
    location /uploads/ {
      alias /var/www/uploads/;
      expires 7d;
      add_header Cache-Control "public";
    }

    # App Next.js
    location / {
      set $nextjs_upstream http://app:3000;
      proxy_pass         $nextjs_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        'upgrade';
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
